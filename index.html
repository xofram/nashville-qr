<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nashville 🍔</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeUp 0.5s ease both;
      max-width: 340px;
      width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emoji { font-size: 48px; animation: bounce 1.6s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 20vw, 84px);
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .brand span { color: #f5a623; }

    .divider { width: 40px; height: 2px; background: #f5a623; border-radius: 2px; }

    .coupon-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 14px;
      padding: 20px 28px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .coupon-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .coupon-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 0.1em;
      color: #f5a623;
      line-height: 1;
    }
    .coupon-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 24px;
      background: #25D366;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: transform 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 24px rgba(37,211,102,0.3);
    }
    .wa-btn:active { transform: scale(0.97); opacity: 0.9; }

    .wa-icon { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    .footer-note {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="emoji">🍔</div>
    <div class="brand">NASH<span>VILLE</span></div>
    <div class="divider"></div>

    <div class="coupon-box">
      <div class="coupon-label">Tu cupón de descuento</div>
      <div class="coupon-code" id="couponCode">...</div>
      <div class="coupon-desc">5% OFF · Válido 72hs · Canjeable al pedir</div>
    </div>

    <a class="wa-btn" id="waBtn" href="#">
      <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Canjear mi cupón
    </a>

    <p class="footer-note">Al tocar el botón se abre WhatsApp<br>con el mensaje listo para enviar</p>
  </div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtOCmyr7VOyL0TgwC2kfcx2wCLvH6G0vSF1LKCxZimcjN8zoKFU6SZzXWQYYqr-A-luA/exec';
    const WA_NUMBER  = '5493517886903';
    // ───────────────────────────────────────────────────────────

    // Leer el tipo desde el parámetro de la URL (?tipo=poste, ?tipo=parada_colectivo, etc.)
    const params = new URLSearchParams(window.location.search);
    const tipo   = params.get('tipo') || 'desconocido';

    // Generar cupón en el cliente
    function generateCoupon() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = 'NASH-';
      for (let i = 0; i < 4; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    const coupon = generateCoupon();
    document.getElementById('couponCode').textContent = coupon;

    // Armar mensaje y link de WhatsApp
    const rawMsg = '¡Hola Nashville! 🍔 Vi su poster por el barrio y no pude resistirme. '
                 + 'Quería escribirles para canjear mi cupón del 5% OFF y de paso enterarme de todo.\n'
                 + 'Mi cupón es: ' + coupon + '\n'
                 + '¿Cuándo puedo pedirles?';

    const encoded = encodeURIComponent(rawMsg);
    const waUrl   = 'https://wa.me/' + WA_NUMBER + '?text=' + encoded;
    document.getElementById('waBtn').href = waUrl;

    // Log al backend con geo real + IP para rate limiting + User-Agent
    fetch('https://ip-api.com/json/?fields=status,lat,lon,city,regionName,query')
      .then(r => r.json())
      .then(geo => {
        const p = new URLSearchParams({
          tipo,
          coupon,
          lat:    geo.status === 'success' ? geo.lat        : '',
          lon:    geo.status === 'success' ? geo.lon        : '',
          city:   geo.status === 'success' ? geo.city       : '',
          region: geo.status === 'success' ? geo.regionName : '',
          ip:     geo.status === 'success' ? geo.query      : '',
          ua:     navigator.userAgent.substring(0, 150)
        });
        fetch(SCRIPT_URL + '?' + p.toString(), { mode: 'no-cors' });
      })
      .catch(() => {
        const p = new URLSearchParams({ tipo, coupon, ua: navigator.userAgent.substring(0, 150) });
        fetch(SCRIPT_URL + '?' + p.toString(), { mode: 'no-cors' });
      });
  </script>
</body>
</html>
